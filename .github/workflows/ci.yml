# 每次 push/PR 跑全 workspace 测试——「每步必须绿」从此有机器把关。
# macOS runner：与开发机同环境（egui/AccessKit 行为一致）；测试不依赖 officecli/claude 子进程。
name: CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace
      - run: cargo test --workspace
